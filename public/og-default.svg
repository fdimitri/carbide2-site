<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e0a"/>
      <stop offset="100%" stop-color="#10160f"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7fff9a" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <text x="80" y="280" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="86" font-weight="700" fill="#7fff9a">CARB/IDE2</text>
  <text x="80" y="350" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="32" fill="#cfe6c5">A collaborative browser IDE.</text>
  <text x="80" y="395" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="22" fill="#7d9275">Live shared terminals · in-DB filesystem · built-in chat</text>
  <text x="80" y="560" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="20" fill="#3dd66f">carbidecore.online</text>
</svg>
